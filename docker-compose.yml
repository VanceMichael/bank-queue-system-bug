services:
  redis:
    image: redis:7-alpine
    container_name: bank-queue-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - bank-queue-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bank-queue-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=8080
      - TZ=Asia/Shanghai
    depends_on:
      - redis
    networks:
      - bank-queue-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bank-queue-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - backend
    networks:
      - bank-queue-network

volumes:
  redis_data:

networks:
  bank-queue-network:
    driver: bridge
